name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # 👈 만약 네 메인 브랜치 이름이 master면 master로 고치셈

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Client ID from Secrets
        run: |
          # index.html 안의 땜빵용 텍스트를 네가 등록한 Secret 값으로 강제 치환함
          sed -i 's/GITHUB_SECRET_CLIENT_ID/${{ secrets.CLIENT_ID }}/g' index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 현재 폴더 전체 업로드

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
